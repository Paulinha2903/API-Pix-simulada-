<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}" />

    <title>Pagamento</title>
  </head>
  <body>
    <main>
      <header>
        <div id="qr-code">
          <img src="{{ qr_code }}" alt="QR Code" />
        </div>

        <aside>
          <h1>Pedido realizado!</h1>
          <p>
            Para pagar, selecione a opção de <strong>Pix com QR Code</strong> no
            seu aplicativo de pagamentos e escaneie o código ao lado.
          </p>

          <div id="purchase-value">
            <img src="{{url_for('static', filename='img/tag.svg')}}" alt="Ícone de tag" />
            <span>Compra de R$ <strong id="amount">{{ ('%.2f' % valor).replace('.', ',') }}</strong></span>
          </div>
        </aside>
      </header>

      <footer>
        <div id="expiration-time">
          <header>
            <small>Este QR Code expira em</small>
            <div>
              <img src="{{ url_for('static', filename='img/clock.svg') }}" alt="Ícone relógio" />
              <span>30 minutos</span>
            </div>
          </header>

          <span>Avisaremos quando o pagamento for confirmado</span>
        </div>

        <div id="order">
          <small>O número do seu pedido é</small>
          <div>
            <img src="{{ url_for('static', filename='img/basket.svg') }}" alt="Ícone do pedido" />
            <span>{{ order }}</span>
          </div>
        </div>
      </footer>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA==" crossorigin="anonymous"></script>
    <script>
      const socket = io.connect('{{ host }}');
      socket.on('connect', function() {
        console.log('Conectado ao servidor WebSocket');

        socket.on('payment_confirmed', function(data) {
          console.log('Pagamento confirmado:', data);
          if (data.order_id === '{{ order }}') {
            alert('Pagamento confirmado para o pedido: ' + data.order_id);
          }
        });
      });
    </script>
  </body>
</html>
